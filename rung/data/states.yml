# State/province cannabis program data (US states + DC, then Canadian provinces).
# programs: none | cbd_only | medical | recreational | both
# program_term: the term to use in search queries for this state's program
# agency: the regulatory agency name (used in search queries)
# known_url: the agency's cannabis-program landing page. HEAD-verified before any
#   search-engine fallback; a live page seeds best_url directly. Leave "" for states
#   with no program or no reliably-known page (those fall back to search).
# country: ISO-3166 alpha-2, default US. Canadian provinces ride the same rows —
#   their 2-letter codes don't collide with USPS codes (docs/canada_expansion.md D1).

- abbr: AK
  name: Alaska
  programs: both
  program_term: cannabis
  agency: Alcohol and Marijuana Control Office
  known_url: https://www.commerce.alaska.gov/web/amco/

- abbr: AL
  name: Alabama
  programs: medical
  program_term: medical cannabis
  agency: Alabama Medical Cannabis Commission
  known_url: https://amcc.alabama.gov/
  # AMCC publishes no roster table. Its patients page carries a prose "Dispensary Opening
  # Announcements" block — a <p> of <br/>-separated lines: name, street, "City, ST zip". The table
  # parser and the block-address parser both return 0 there (the latter needs a comma between street
  # and city), so the line-block rung reads it. Verified live 2026-07-10: ONE dispensary, Callie's
  # Apothecary (Montgomery), opened 2026-06-04 — Alabama's first. The Commission says more will open,
  # and this page is where they will be announced, so the roster grows without further code.
  list_url: https://amcc.alabama.gov/patients/
  list_type: html

