# US state cannabis program data.
# programs: none | cbd_only | medical | recreational | both
# program_term: the term to use in search queries for this state's program
# agency: the regulatory agency name (used in search queries)
# known_url: the agency's cannabis-program landing page. HEAD-verified before any
#   search-engine fallback; a live page seeds best_url directly. Leave "" for states
#   with no program or no reliably-known page (those fall back to search).

- abbr: AK
  name: Alaska
  programs: both
  program_term: cannabis
  agency: Alcohol and Marijuana Control Office
  known_url: https://www.commerce.alaska.gov/web/amco/

- abbr: AL
  name: Alabama
  programs: medical
  program_term: medical cannabis
  agency: Alabama Medical Cannabis Commission
  known_url: https://amcc.alabama.gov/

- abbr: AR
  name: Arkansas
  programs: medical
  program_term: medical marijuana
  agency: Arkansas Department of Finance and Administration
  known_url: https://www.dfa.arkansas.gov/alcoholic-beverage-control/medical-marijuana/

- abbr: AZ
  name: Arizona
  programs: both
  program_term: cannabis
  agency: Arizona Department of Health Services
  known_url: https://www.azdhs.gov/licensing/marijuana/index.php
  # AZDHS publishes its licensed establishments as a borderless, word-wrapped PDF that the
  # generic pdfplumber table path mangles; the az_dhs handler parses it by column x-position.
  list_url: https://www.azdhs.gov/documents/licensing/medical-marijuana/applications/licensed-marijuana-establishments.pdf
  list_type: az_dhs

- abbr: CA
  name: California
  programs: both
  program_term: cannabis
  agency: Department of Cannabis Control
  known_url: https://cannabis.ca.gov/
  # DCC's licensed-retailers map is a paginated JSON API (no static list);
  # the ca_dcc handler sweeps a statewide bbox for active retailers.
  list_url: https://as-dcc-pub-cann-w-p-002.azurewebsites.net/licenses/RetailerLocationSearch
  list_type: ca_dcc

- abbr: CO
  name: Colorado
  programs: both
  program_term: cannabis
  agency: Marijuana Enforcement Division
  known_url: https://sbg.colorado.gov/med
  # CO MED publishes its licensed "Stores" list as a (monthly-updated) Google Sheet; the
  # CSV export has DBA + street + zip. co_med prefers the DBA brand over the legal entity.
  # NOTE: this sheet is the MEDICAL stores; retail stores are bootstrapped from the Dutchie pool.
  list_url: https://docs.google.com/spreadsheets/d/1PqYThJJwGEsrwWvciu9vXosuC0BzAw4YtD03RvlSKzE/export?format=csv
  list_type: co_med

- abbr: CT
  name: Connecticut
  programs: both
