  known_url: https://portal.ct.gov/cannabis
  # CT publishes its licensed cannabis/medical retail locations as a Socrata dataset
  # (DBA + street + city + zip); the CSV handler prefers the DBA brand.
  list_url: https://internal-data.ct.gov/resource/42yd-3x3d.csv
  list_type: csv

