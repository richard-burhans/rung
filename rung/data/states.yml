# State/province cannabis program data (US states + DC, then Canadian provinces).
# programs: none | cbd_only | medical | recreational | both
# program_term: the term to use in search queries for this state's program
# agency: the regulatory agency name (used in search queries)
# known_url: the agency's cannabis-program landing page. HEAD-verified before any
#   search-engine fallback; a live page seeds best_url directly. Leave "" for states
#   with no program or no reliably-known page (those fall back to search).
# country: ISO-3166 alpha-2, default US. Canadian provinces ride the same rows —
#   their 2-letter codes don't collide with USPS codes (docs/canada_expansion.md D1).

