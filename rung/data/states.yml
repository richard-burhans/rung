- abbr: OK
  name: Oklahoma
  programs: medical
  program_term: medical marijuana
  agency: Oklahoma Medical Marijuana Authority
  known_url: https://oklahoma.gov/omma.html
  # Largest US dispensary market (~2,000 medical, mostly independents). The official OMMA
  # roster moved behind a JS-gated MedPortal (Salesforce), so there is no static list_url —
  # discovery is platform-sweep-driven: Dutchie-pool bootstrap (validated 2026-06-18: 9
  # geo-anchors -> 327 Dutchie dispensaries) + Weedmaps/Leafly for the independent long tail.
  # Bring-up queued to run after the mg backfill (avoids aggregator-IP contention).

