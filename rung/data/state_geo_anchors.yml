# Geo anchors for the Dutchie platform-directory sweep (sources/dutchie.py).
#
# Dutchie's consumer GraphQL resolves dispensaries by GEO radius, not by state, so
# we enumerate a state by sweeping a handful of population-center anchors and merging
# the results (deduped by dispensary id). Each entry is [latitude, longitude]; the
# sweep radius is fixed in sources/dutchie.py (_ANCHOR_RADIUS_MI).
#
# Coverage is a recall knob: add anchors for a state's population centers until the
# pool stops growing. A state with no anchors yields an empty pool — the dutchie
# rung then returns nothing and the company falls through to the next method.
#
# Each sweep randomly jitters every anchor by up to _ANCHOR_JITTER_DEG (~7 mi, in
# sources/dutchie.py) so repeat runs don't send byte-identical coordinates (anti-
# fingerprint). The jitter is bounded inside the radius margin, so place anchors with
# the usual overlap and the in-range store set stays stable run to run.
#
# PA verified: these 5 anchors @ 75 mi deduped to 107 PA Dutchie dispensaries.

PA:
  - [39.9526, -75.1652]   # Philadelphia
  - [40.4406, -79.9959]   # Pittsburgh
  - [40.2732, -76.8867]   # Harrisburg
  - [42.1292, -80.0851]   # Erie
  - [41.4090, -75.6624]   # Scranton

