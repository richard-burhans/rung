<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="rung">
  <title>rung</title>
  <style>
    :root { --ink: #0e2a29; --sig: #12b3a0; }
    @media (prefers-color-scheme: dark) { :root { --ink: #dfeceb; --sig: #3fe0cc; } }
    .rail { fill: var(--ink); }
    .rung { fill: var(--ink); opacity: .34; }
    @keyframes litclimb {
      0%, 100% { fill: var(--ink); opacity: .34; }
      12%, 24% { fill: var(--sig); opacity: 1; }
    }
    .r0 { animation: litclimb 3.6s ease-in-out infinite; }
    .r1 { animation: litclimb 3.6s ease-in-out infinite .45s; }
    .r2 { animation: litclimb 3.6s ease-in-out infinite .9s; }
    @media (prefers-reduced-motion: reduce) {
      .rung { animation: none; }
      .r1 { fill: var(--sig); opacity: 1; }
    }
  </style>
  <rect class="rung r2" x="13" y="10.2" width="22" height="4.4" rx="2.2"/>
  <rect class="rung r1" x="13" y="21.8" width="22" height="4.4" rx="2.2"/>
  <rect class="rung r0" x="13" y="33.4" width="22" height="4.4" rx="2.2"/>
  <rect class="rail" x="11.5" y="5.5" width="5" height="37" rx="2.5"/>
  <rect class="rail" x="31.5" y="5.5" width="5" height="37" rx="2.5"/>
</svg>
